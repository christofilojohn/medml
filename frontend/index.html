<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedML Forge - Training Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#43474f",
                        "on-secondary-container": "#54118a",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#003709",
                        "surface": "#f8f9fa",
                        "surface-container": "#edeeef",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#a3f69c",
                        "secondary": "#7b41b3",
                        "secondary-fixed-dim": "#ddb7ff",
                        "background": "#f8f9fa",
                        "on-background": "#191c1d",
                        "on-primary-fixed": "#001b3f",
                        "secondary-fixed": "#f0dbff",
                        "surface-container-high": "#e7e8e9",
                        "on-primary-fixed-variant": "#24467c",
                        "primary": "#00193c",
                        "outline-variant": "#c4c6d1",
                        "primary-fixed-dim": "#abc7ff",
                        "surface-variant": "#e1e3e4",
                        "tertiary-fixed-dim": "#88d982",
                        "surface-bright": "#f8f9fa",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#abc7ff",
                        "on-secondary-fixed": "#2c0050",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#002204",
                        "on-primary-container": "#7796d1",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#005312",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-low": "#f3f4f5",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed-variant": "#622599",
                        "tertiary": "#001f03",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#58a756",
                        "primary-container": "#002d62",
                        "outline": "#747781",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-container": "#c588fe",
                        "on-surface": "#191c1d",
                        "primary-fixed": "#d7e2ff",
                        "surface-tint": "#3e5e95"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        input[type=range] {
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: transparent;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border-radius: 4px;
            background: #00193c;
            cursor: grab;
            margin-top: -8px;
            border: 3px solid #ffffff;
            box-shadow: 0 1px 4px rgba(0,25,60,0.30);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.12);
            box-shadow: 0 2px 8px rgba(0,25,60,0.35);
        }
        input[type=range]:active::-webkit-slider-thumb {
            cursor: grabbing;
            transform: scale(1.05);
        }
        body { min-height: max(884px, 100dvh); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
        .fade-up { animation: fadeUp 0.35s ease both; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c4c6d1; border-radius: 3px; }
    </style>
  </head>
  <body class="bg-surface font-body text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
